name: Build Pro Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          rm -rf ~/theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C ~/theos/sdks --strip-components=1
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Install Signing Tools
        run: |
          brew install ldid

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # نستخدم make فقط لصنع الـ dylib بدون تجميع الحزمة الكاملة
          make FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Mohammed_Dylib
          # هنا بنغير المسار عشان يسحب ملف الـ dylib اللي تصنع في مجلد الـ obj
          path: .theos/obj/debug/*.dylib
