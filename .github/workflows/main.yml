name: Build Pro Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # تحميل الـ Theos مباشرة بدون وسيط
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDKs المطلوبة بشكل يدوي
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Mohammed_Dylib
          path: packages/*.dylib
